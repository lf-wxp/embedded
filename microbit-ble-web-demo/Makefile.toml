# =============================================================================
# micro:bit V2 BLE Web Demo - cargo-make task configuration
# Leptos frontend version
#
# Usage:
#   cargo make serve        - Start Trunk dev server (http://127.0.0.1:8080)
#   cargo make build        - Build Release version (Trunk build)
#   cargo make build-debug  - Build Debug version (Trunk build --debug)
#   cargo make check        - Check code compilation
#   cargo make fmt          - Format code
#   cargo make clippy       - Run Clippy static analysis
#   cargo make clean        - Clean build artifacts
#   cargo make test         - Run tests
# =============================================================================

[env]
HOST_TARGET = "${CARGO_MAKE_CRATE_TARGET_TRIPLE}"
WASM_TARGET = "wasm32-unknown-unknown"

# =============================================================================
# Default task: start dev server
# =============================================================================
[tasks.default]
alias = "serve"

# =============================================================================
# serve - Start Trunk dev server
# =============================================================================
[tasks.server]
args = ["serve", "--open"]
command = "trunk"
description = "Start Trunk dev server (http://127.0.0.1:8080)"

# =============================================================================
# build - Build Release version
# =============================================================================
[tasks.build]
args = ["build", "--release"]
command = "trunk"
description = "Build Release version (Trunk build)"

# =============================================================================
# build-debug - Build Debug version
# =============================================================================
[tasks.build-debug]
args = ["build"]
command = "trunk"
description = "Build Debug version (Trunk build)"

# =============================================================================
# check - Check code compilation (without generating WASM)
# =============================================================================
[tasks.check]
args = ["check", "--target", "${WASM_TARGET}"]
command = "cargo"
description = "Check if code compiles correctly"

# =============================================================================
# fmt - Format code
# =============================================================================
[tasks.fmt]
args = ["fmt"]
command = "cargo"
description = "Format code using rustfmt"

# =============================================================================
# fmt-check - Check code format (without modifying files)
# =============================================================================
[tasks.fmt-check]
args = ["fmt", "--", "--check"]
command = "cargo"
description = "Check code format compliance (without modifying files)"

# =============================================================================
# clippy - Run Clippy static analysis
# =============================================================================
[tasks.clippy]
args = ["clippy", "--target", "${WASM_TARGET}", "--", "-D", "warnings"]
command = "cargo"
description = "Run Clippy static analysis checks"

# =============================================================================
# clean - Clean build artifacts
# =============================================================================
[tasks.clean]
description = "Clean build artifacts (target + dist)"
script = [
  "cargo clean",
  "rm -rf dist/",
]

# =============================================================================
# test - Run tests
# =============================================================================
[tasks.test]
args = ["test", "--target", "${HOST_TARGET}"]
command = "cargo"
description = "Run tests"

# =============================================================================
# install-tools - Install required tools
# =============================================================================
[tasks.install-tools]
description = "Install required tools (trunk, wasm-bindgen-cli)"
script = [
  "cargo install trunk wasm-bindgen-cli",
  "rustup target add wasm32-unknown-unknown",
]

# =============================================================================
# deploy - Deploy to GitHub Pages (optional)
# =============================================================================
[tasks.deploy]
dependencies = ["build"]
description = "Deploy to GitHub Pages"
script = [
  "echo 'Deployment complete, dist/ directory contains static files'",
  "echo 'Push to GitHub Pages or upload to any static file server'",
]

# =============================================================================
# Docker related tasks
# =============================================================================

# -----------------------------------------------------------------------------
# docker-build - Build Docker image
# -----------------------------------------------------------------------------
[tasks.docker-build]
description = "Build Docker image"
command = "docker"
args = ["build", "-t", "microbit-ble-web-demo:latest", "."]

# -----------------------------------------------------------------------------
# docker-build-nocache - Build Docker image without cache
# -----------------------------------------------------------------------------
[tasks.docker-build-nocache]
description = "Build Docker image without cache"
command = "docker"
args = ["build", "--no-cache", "-t", "microbit-ble-web-demo:latest", "."]

# -----------------------------------------------------------------------------
# docker-up - Start Docker container (detached)
# -----------------------------------------------------------------------------
[tasks.docker-up]
description = "Start Docker container (docker-compose up -d)"
command = "docker-compose"
args = ["up", "-d"]

# -----------------------------------------------------------------------------
# docker-down - Stop and remove Docker container
# -----------------------------------------------------------------------------
[tasks.docker-down]
description = "Stop and remove Docker container (docker-compose down)"
command = "docker-compose"
args = ["down"]

# -----------------------------------------------------------------------------
# docker-logs - View Docker container logs
# -----------------------------------------------------------------------------
[tasks.docker-logs]
description = "View Docker container logs (docker-compose logs -f)"
command = "docker-compose"
args = ["logs", "-f"]

# -----------------------------------------------------------------------------
# docker-restart - Restart Docker container
# -----------------------------------------------------------------------------
[tasks.docker-restart]
description = "Restart Docker container"
command = "docker-compose"
args = ["restart"]

# -----------------------------------------------------------------------------
# docker-ps - View running Docker containers
# -----------------------------------------------------------------------------
[tasks.docker-ps]
description = "View running Docker containers"
command = "docker-compose"
args = ["ps"]

# -----------------------------------------------------------------------------
# docker-clean - Clean Docker containers, images, and networks
# -----------------------------------------------------------------------------
[tasks.docker-clean]
description = "Clean Docker containers, images, and networks"
script = [
  "docker-compose down -v --rmi all",
  "docker system prune -f",
]

# -----------------------------------------------------------------------------
# docker-push - Push Docker image to registry (login required first)
# -----------------------------------------------------------------------------
[tasks.docker-push]
description = "Push Docker image to registry"
command = "docker"
args = ["push", "microbit-ble-web-demo:latest"]

# -----------------------------------------------------------------------------
# docker-all - Full flow: build + start
# -----------------------------------------------------------------------------
[tasks.docker-all]
description = "Full Docker flow: build image and start container"
dependencies = ["docker-build", "docker-up"]

# -----------------------------------------------------------------------------
# docker-rebuild - Rebuild and restart container
# -----------------------------------------------------------------------------
[tasks.docker-rebuild]
description = "Rebuild Docker image and restart container"
dependencies = ["docker-down", "docker-build", "docker-up"]
