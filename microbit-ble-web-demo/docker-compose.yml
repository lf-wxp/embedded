version: "3.8"

services:
  # micro:bit BLE Web Demo service
  microbit-ble-web-demo:
    build:
      context: ../
      dockerfile: microbit-ble-web-demo/Dockerfile
    container_name: microbit-ble-web-demo
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - microbit-net

  # (Optional) Enable the following service if you need a local dev server
  # dev-server:
  #   image: node:alpine
  #   container_name: microbit-ble-dev
  #   working_dir: /app
  #   volumes:
  #     - .:/app
  #   ports:
  #     - "3000:3000"
  #   command: npx serve -s dist -l 3000
  #   networks:
  #     - microbit-net

networks:
  microbit-net:
    driver: bridge
