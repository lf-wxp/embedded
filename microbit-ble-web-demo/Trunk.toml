# Trunk configuration file
# https://trunkrs.dev/configuration/

# Trunk version requirement
trunk-version = "*"

[build]
# Entry HTML file
target = "index.html"
# Release mode
release = false
# Output directory
dist = "./dist"
# Public URL path
public_url = "/"
# Filenames include hash
filehash = true
# Inject scripts
inject_scripts = true
# Offline mode
offline = false
# Freeze dependencies
frozen = false
# Lock dependencies
locked = false
# Minification strategy: never, on_release, always
minify = "never"
# Disable subresource integrity
no_sri = false
# Cargo profile
# cargo_profile = "release-trunk"
# Inject nonce attribute
create_nonce = false

[watch]
# Watch paths (parent dir of build.target is watched by default)
watch = []
# Ignore paths
ignore = []

[serve]
# Server address
addresses = ["127.0.0.1"]
# Server port
port = 8080
# Disable reverse DNS lookup
disable_address_lookup = false
# Open browser after build
open = false
# Disable SPA fallback
no_spa = false
# Disable auto-reload
no_autoreload = false
# Disable error reporting
no_error_reporting = false
# WebSocket protocol
ws_protocol = "ws"
# TLS certificate and private key (enable TLS when both are set)
# tls_cert_path = "self_signed_certs/cert.pem"
# tls_key_path = "self_signed_certs/key.pem"
# Extra response headers
# headers = { "X-Foo" = "bar" }

[clean]
# Whether to run cargo clean
cargo = false

[tools]
# sass version
sass = "1.69.5"
# wasm-bindgen version

## Proxy settings (optional, default is None)
# [[proxy]]
# backend = "ws://localhost:9000/api/ws"
# ws = true

## Build hooks (optional, default is None)
# [[hooks]]
# stage = "pre_build"
# command = "echo"
# command_arguments = ["Hello", "Trunk!"]
