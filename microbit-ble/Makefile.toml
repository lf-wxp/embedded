# =============================================================================
# micro:bit V2 BLE Project - cargo-make task configuration
#
# Usage:
#   cargo make flash        - One-click: Flash SoftDevice + compile & flash app + reset
#   cargo make run          - Compile, flash, and monitor defmt log output (for debugging)
#   cargo make flash-sd     - Flash SoftDevice S113 only
#   cargo make flash-app    - Compile and flash application only
#   cargo make erase        - Fully erase chip
#   cargo make reset        - Reset chip
#   cargo make check        - Check code compilation
#   cargo make fmt          - Format code
#   cargo make clippy       - Run Clippy static analysis
# =============================================================================

[env]
CHIP = "nRF52833_xxAA"
SOFTDEVICE_HEX = "softdevice/s113_nrf52_7.3.0_softdevice.hex"
TARGET = "thumbv7em-none-eabihf"

# =============================================================================
# Default task: one-click flash all
# =============================================================================
[tasks.default]
alias = "flash"

# =============================================================================
# flash - Full flow: flash SoftDevice + compile & flash app + reset
# =============================================================================
[tasks.flash]
description = "One-click: Flash SoftDevice + compile & flash application + reset chip"
dependencies = ["flash-sd", "flash-app", "reset"]

# =============================================================================
# flash-sd - Flash SoftDevice S113 protocol stack
# =============================================================================
[tasks.flash-sd]
description = "Flash SoftDevice S113 v7.3.0 to chip"
command = "probe-rs"
args = ["download", "--chip", "${CHIP}", "--binary-format", "ihex", "${SOFTDEVICE_HEX}"]

[tasks.flash-sd.condition]
files_exist = ["${SOFTDEVICE_HEX}"]

# =============================================================================
# flash-app - Compile and flash application
# =============================================================================
[tasks.flash-app]
description = "Compile and flash application (Release mode)"
dependencies = ["build"]
command = "probe-rs"
args = ["download", "--chip", "${CHIP}", "target/${TARGET}/release/microbit-ble"]

# =============================================================================
# flash-app-debug - Compile and flash application (Debug mode)
# =============================================================================
[tasks.flash-app-debug]
description = "Compile and flash application (Debug mode)"
dependencies = ["build-debug"]
command = "probe-rs"
args = ["download", "--chip", "${CHIP}", "target/${TARGET}/debug/microbit-ble"]

# =============================================================================
# erase - Fully erase chip (including SoftDevice)
# =============================================================================
[tasks.erase]
description = "Fully erase chip Flash (including SoftDevice)"
command = "probe-rs"
args = ["erase", "--chip", "${CHIP}"]

# =============================================================================
# reset - Reset chip
# =============================================================================
[tasks.reset]
description = "Reset chip"
command = "probe-rs"
args = ["reset", "--chip", "${CHIP}"]

# =============================================================================
# check - Check code compilation
# =============================================================================
[tasks.check]
description = "Check if code compiles correctly"
command = "cargo"
args = ["check"]

# =============================================================================
# fmt - Format code
# =============================================================================
[tasks.fmt]
description = "Format code using rustfmt"
command = "cargo"
args = ["fmt"]

# =============================================================================
# fmt-check - Check code format (without modifying files)
# =============================================================================
[tasks.fmt-check]
description = "Check code format compliance (without modifying files)"
command = "cargo"
args = ["fmt", "--", "--check"]

# =============================================================================
# clippy - Run Clippy static analysis
# =============================================================================
[tasks.clippy]
description = "Run Clippy static analysis checks"
command = "cargo"
args = ["clippy", "--", "-D", "warnings"]

# =============================================================================
# build - Compile Release firmware (without flashing)
# =============================================================================
[tasks.build]
description = "Compile Release firmware (without flashing)"
command = "cargo"
args = ["build", "--release"]

# =============================================================================
# build-debug - Compile Debug firmware (without flashing)
# =============================================================================
[tasks.build-debug]
description = "Compile Debug firmware (without flashing)"
command = "cargo"
args = ["build"]

# =============================================================================
# clean - Clean build artifacts
# =============================================================================
[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# =============================================================================
# run - Compile, flash, and monitor defmt log output (for debugging)
# =============================================================================
[tasks.run]
description = "Compile and flash application, then monitor defmt log output after reset (for debugging)"
dependencies = ["flash-sd", "build"]
script_runner = "@shell"
script = '''
echo ">>> Flashing application..."
probe-rs download --chip ${CHIP} target/${TARGET}/release/microbit-ble
echo ">>> Resetting chip (normal boot from MBR/SoftDevice)..."
probe-rs reset --chip ${CHIP}
echo ">>> Attaching RTT logger (Press Ctrl+C to exit)..."
probe-rs attach --chip ${CHIP} --rtt-scan-memory target/${TARGET}/release/microbit-ble
'''

# =============================================================================
# run-debug - Debug mode: compile, flash, and monitor logs
# =============================================================================
[tasks.run-debug]
description = "Debug mode: compile and flash, then monitor defmt log output after reset"
dependencies = ["flash-sd", "build-debug"]
script_runner = "@shell"
script = '''
echo ">>> Flashing application (Debug)..."
probe-rs download --chip ${CHIP} target/${TARGET}/debug/microbit-ble
echo ">>> Resetting chip (normal boot from MBR/SoftDevice)..."
probe-rs reset --chip ${CHIP}
echo ">>> Attaching RTT logger (Press Ctrl+C to exit)..."
probe-rs attach --chip ${CHIP} --rtt-scan-memory target/${TARGET}/debug/microbit-ble
'''

# =============================================================================
# init - Full initialization: erase chip + flash everything
# =============================================================================
[tasks.init]
description = "Full initialization: erase chip + flash everything"
dependencies = ["erase", "flash"]
