# =============================================================================
# micro:bit V2 BLE Web Demo - cargo-make 任务配置
# Leptos 前端版本
#
# 使用方法:
#   cargo make serve        - 启动 Trunk 开发服务器 (http://127.0.0.1:8080)
#   cargo make build        - 编译 Release 版本 (Trunk build)
#   cargo make build-debug  - 编译 Debug 版本 (Trunk build --debug)
#   cargo make check        - 检查代码编译
#   cargo make fmt          - 格式化代码
#   cargo make clippy       - 运行 Clippy 静态分析
#   cargo make clean        - 清理构建产物
#   cargo make test         - 运行测试
# =============================================================================

[env]
HOST_TARGET = "${CARGO_MAKE_CRATE_TARGET_TRIPLE}"
WASM_TARGET = "wasm32-unknown-unknown"

# =============================================================================
# 默认任务: 启动开发服务器
# =============================================================================
[tasks.default]
alias = "serve"

# =============================================================================
# serve - 启动 Trunk 开发服务器
# =============================================================================
[tasks.server]
args = ["serve", "--open"]
command = "trunk"
description = "启动 Trunk 开发服务器 (http://127.0.0.1:8080)"

# =============================================================================
# build - 编译 Release 版本
# =============================================================================
[tasks.build]
args = ["build", "--release"]
command = "trunk"
description = "编译 Release 版本 (Trunk build)"

# =============================================================================
# build-debug - 编译 Debug 版本
# =============================================================================
[tasks.build-debug]
args = ["build"]
command = "trunk"
description = "编译 Debug 版本 (Trunk build)"

# =============================================================================
# check - 检查代码编译 (不生成 WASM)
# =============================================================================
[tasks.check]
args = ["check", "--target", "${WASM_TARGET}"]
command = "cargo"
description = "检查代码是否能正确编译"

# =============================================================================
# fmt - 格式化代码
# =============================================================================
[tasks.fmt]
args = ["fmt"]
command = "cargo"
description = "使用 rustfmt 格式化代码"

# =============================================================================
# fmt-check - 检查代码格式 (不修改文件)
# =============================================================================
[tasks.fmt-check]
args = ["fmt", "--", "--check"]
command = "cargo"
description = "检查代码格式是否符合规范 (不修改文件)"

# =============================================================================
# clippy - 运行 Clippy 静态分析
# =============================================================================
[tasks.clippy]
args = ["clippy", "--target", "${WASM_TARGET}", "--", "-D", "warnings"]
command = "cargo"
description = "运行 Clippy 静态分析检查"

# =============================================================================
# clean - 清理构建产物
# =============================================================================
[tasks.clean]
description = "清理构建产物 (target + dist)"
script = [
  "cargo clean",
  "rm -rf dist/",
]

# =============================================================================
# test - 运行测试
# =============================================================================
[tasks.test]
args = ["test", "--target", "${HOST_TARGET}"]
command = "cargo"
description = "运行测试"

# =============================================================================
# install-tools - 安装所需工具
# =============================================================================
[tasks.install-tools]
description = "安装所需工具 (trunk, wasm-bindgen-cli)"
script = [
  "cargo install trunk wasm-bindgen-cli",
  "rustup target add wasm32-unknown-unknown",
]

# =============================================================================
# deploy - 部署到 GitHub Pages (可选)
# =============================================================================
[tasks.deploy]
dependencies = ["build"]
description = "部署到 GitHub Pages"
script = [
  "echo '部署完成，dist/ 目录包含静态文件'",
  "echo '可将其推送到 GitHub Pages 或上传到任意静态文件服务器'",
]
