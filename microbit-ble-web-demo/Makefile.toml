# =============================================================================
# micro:bit V2 BLE Web Demo - cargo-make 任务配置
# Leptos 前端版本
#
# 使用方法:
#   cargo make serve        - 启动 Trunk 开发服务器 (http://127.0.0.1:8080)
#   cargo make build        - 编译 Release 版本 (Trunk build)
#   cargo make build-debug  - 编译 Debug 版本 (Trunk build --debug)
#   cargo make check        - 检查代码编译
#   cargo make fmt          - 格式化代码
#   cargo make clippy       - 运行 Clippy 静态分析
#   cargo make clean        - 清理构建产物
#   cargo make test         - 运行测试
# =============================================================================

[env]
HOST_TARGET = "${CARGO_MAKE_CRATE_TARGET_TRIPLE}"
WASM_TARGET = "wasm32-unknown-unknown"

# =============================================================================
# 默认任务: 启动开发服务器
# =============================================================================
[tasks.default]
alias = "serve"

# =============================================================================
# serve - 启动 Trunk 开发服务器
# =============================================================================
[tasks.server]
args = ["serve", "--open"]
command = "trunk"
description = "启动 Trunk 开发服务器 (http://127.0.0.1:8080)"

# =============================================================================
# build - 编译 Release 版本
# =============================================================================
[tasks.build]
args = ["build", "--release"]
command = "trunk"
description = "编译 Release 版本 (Trunk build)"

# =============================================================================
# build-debug - 编译 Debug 版本
# =============================================================================
[tasks.build-debug]
args = ["build"]
command = "trunk"
description = "编译 Debug 版本 (Trunk build)"

# =============================================================================
# check - 检查代码编译 (不生成 WASM)
# =============================================================================
[tasks.check]
args = ["check", "--target", "${WASM_TARGET}"]
command = "cargo"
description = "检查代码是否能正确编译"

# =============================================================================
# fmt - 格式化代码
# =============================================================================
[tasks.fmt]
args = ["fmt"]
command = "cargo"
description = "使用 rustfmt 格式化代码"

# =============================================================================
# fmt-check - 检查代码格式 (不修改文件)
# =============================================================================
[tasks.fmt-check]
args = ["fmt", "--", "--check"]
command = "cargo"
description = "检查代码格式是否符合规范 (不修改文件)"

# =============================================================================
# clippy - 运行 Clippy 静态分析
# =============================================================================
[tasks.clippy]
args = ["clippy", "--target", "${WASM_TARGET}", "--", "-D", "warnings"]
command = "cargo"
description = "运行 Clippy 静态分析检查"

# =============================================================================
# clean - 清理构建产物
# =============================================================================
[tasks.clean]
description = "清理构建产物 (target + dist)"
script = [
  "cargo clean",
  "rm -rf dist/",
]

# =============================================================================
# test - 运行测试
# =============================================================================
[tasks.test]
args = ["test", "--target", "${HOST_TARGET}"]
command = "cargo"
description = "运行测试"

# =============================================================================
# install-tools - 安装所需工具
# =============================================================================
[tasks.install-tools]
description = "安装所需工具 (trunk, wasm-bindgen-cli)"
script = [
  "cargo install trunk wasm-bindgen-cli",
  "rustup target add wasm32-unknown-unknown",
]

# =============================================================================
# deploy - 部署到 GitHub Pages (可选)
# =============================================================================
[tasks.deploy]
dependencies = ["build"]
description = "部署到 GitHub Pages"
script = [
  "echo '部署完成，dist/ 目录包含静态文件'",
  "echo '可将其推送到 GitHub Pages 或上传到任意静态文件服务器'",
]

# =============================================================================
# Docker 相关任务
# =============================================================================

# -----------------------------------------------------------------------------
# docker-build - 构建 Docker 镜像
# -----------------------------------------------------------------------------
[tasks.docker-build]
description = "构建 Docker 镜像"
command = "docker"
args = ["build", "-t", "microbit-ble-web-demo:latest", "."]

# -----------------------------------------------------------------------------
# docker-build-nocache - 无缓存构建 Docker 镜像
# -----------------------------------------------------------------------------
[tasks.docker-build-nocache]
description = "无缓存构建 Docker 镜像"
command = "docker"
args = ["build", "--no-cache", "-t", "microbit-ble-web-demo:latest", "."]

# -----------------------------------------------------------------------------
# docker-up - 启动 Docker 容器 (后台运行)
# -----------------------------------------------------------------------------
[tasks.docker-up]
description = "启动 Docker 容器 (docker-compose up -d)"
command = "docker-compose"
args = ["up", "-d"]

# -----------------------------------------------------------------------------
# docker-down - 停止并移除 Docker 容器
# -----------------------------------------------------------------------------
[tasks.docker-down]
description = "停止并移除 Docker 容器 (docker-compose down)"
command = "docker-compose"
args = ["down"]

# -----------------------------------------------------------------------------
# docker-logs - 查看 Docker 容器日志
# -----------------------------------------------------------------------------
[tasks.docker-logs]
description = "查看 Docker 容器日志 (docker-compose logs -f)"
command = "docker-compose"
args = ["logs", "-f"]

# -----------------------------------------------------------------------------
# docker-restart - 重启 Docker 容器
# -----------------------------------------------------------------------------
[tasks.docker-restart]
description = "重启 Docker 容器"
command = "docker-compose"
args = ["restart"]

# -----------------------------------------------------------------------------
# docker-ps - 查看运行中的 Docker 容器
# -----------------------------------------------------------------------------
[tasks.docker-ps]
description = "查看运行中的 Docker 容器"
command = "docker-compose"
args = ["ps"]

# -----------------------------------------------------------------------------
# docker-clean - 清理 Docker 容器、镜像和网络
# -----------------------------------------------------------------------------
[tasks.docker-clean]
description = "清理 Docker 容器、镜像和网络"
script = [
  "docker-compose down -v --rmi all",
  "docker system prune -f",
]

# -----------------------------------------------------------------------------
# docker-push - 推送 Docker 镜像到仓库 (需要先登录)
# -----------------------------------------------------------------------------
[tasks.docker-push]
description = "推送 Docker 镜像到仓库"
command = "docker"
args = ["push", "microbit-ble-web-demo:latest"]

# -----------------------------------------------------------------------------
# docker-all - 完整流程: 构建 + 启动
# -----------------------------------------------------------------------------
[tasks.docker-all]
description = "完整 Docker 流程: 构建镜像并启动容器"
dependencies = ["docker-build", "docker-up"]

# -----------------------------------------------------------------------------
# docker-rebuild - 重新构建并重启容器
# -----------------------------------------------------------------------------
[tasks.docker-rebuild]
description = "重新构建 Docker 镜像并重启容器"
dependencies = ["docker-down", "docker-build", "docker-up"]
