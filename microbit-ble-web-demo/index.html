<!doctype html>
<html lang="en">
	<head>

		<title>micro:bit V2 BLE Console - Leptos</title>

		<!-- Trunk auto-injects WASM and JS assets -->

		<!-- Styles -->

		<link data-trunk rel="copy-file" href="style.css" />
		<!-- Browser loads the copied CSS file -->
		<link rel="stylesheet" href="style.css" />

		<!-- favicon -->
		<link
				rel="icon"
				href="data:image/svg+xml<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>"
		/>
	</head>
	<body>
		<!-- Leptos app mounts here -->
		<div id="leptos"></div>
	</body>
</html>
